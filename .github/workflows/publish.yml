name: Publish due posts

# The scheduler. Runs on GitHub's infrastructure independent of whether the
# Render web app is awake, so scheduled posts publish on time even with your
# laptop off. GitHub cron can lag a few minutes under load — fine for a 5-min tick.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Never let two runs publish at the same time (would risk double-posting).
concurrency:
  group: publish-due-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "false"
          # MUST point at the same Neon DB the web app writes to — that shared
          # database is the only link between the web app and this cron.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          # Instagram + LinkedIn publishers are gated on these — without them the
          # cron can't publish IG/LinkedIn posts (only YouTube), so those posts
          # would be skipped instead of going live + emailing you.
          INSTAGRAM_APP_ID: ${{ secrets.INSTAGRAM_APP_ID }}
          INSTAGRAM_APP_SECRET: ${{ secrets.INSTAGRAM_APP_SECRET }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          # Cloudinary: needed for the post-publish source-archive/cleanup step.
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Email notifications. Without these the publish job runs fine but
          # notify_success/failure/skipped silently no-op (no creds on the runner),
          # which is why a post published with the PC off but sent no email.
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          # Used in the email body's "view dashboard" link (no request in cron).
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python manage.py publish_due_posts
