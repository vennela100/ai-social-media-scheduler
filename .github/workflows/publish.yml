name: Publish due posts

# The scheduler. Runs on GitHub's infrastructure independent of whether the
# Render web app is awake, so scheduled posts publish on time even with your
# laptop off. GitHub cron can lag a few minutes under load — fine for a 5-min tick.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Never let two runs publish at the same time (would risk double-posting).
concurrency:
  group: publish-due-posts
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_DEBUG: "false"
          # MUST point at the same Neon DB the web app writes to — that shared
          # database is the only link between the web app and this cron.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python manage.py publish_due_posts
