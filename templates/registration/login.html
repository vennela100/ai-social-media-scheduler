{% extends "base.html" %}
{% block title %}Log in — Cadence{% endblock %}

{% block auth_content %}
  <div class="auth-card reveal">
    <div class="brand">
      <span class="wordmark" style="font-size:34px;">cadence<span class="dot">.</span></span>
    </div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to your creator workspace</p>

    {% if form.errors %}
      <div class="msg error" style="margin-bottom:18px;"><span>Wrong username or password.</span></div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;margin-top:6px;">Sign in</button>
    </form>
    <p class="helptext" style="text-align:center;margin-top:18px;">
      New here? <a href="{% url 'signup' %}">Create an account</a>
    </p>
  </div>
{% endblock %}
