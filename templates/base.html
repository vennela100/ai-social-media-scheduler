<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Social Media Scheduler{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2.5rem auto; padding: 0 1rem; line-height: 1.5; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #8884; padding-bottom: .5rem; }
    header h1 { font-size: 1.25rem; margin: 0; }
    nav a, nav form button { margin-left: 1rem; font-size: .9rem; }
    .muted { opacity: .65; font-size: .9rem; }
    .cards { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
    .card { flex: 1; min-width: 180px; border: 1px solid #8884; border-radius: 10px; padding: 1rem; }
    .card b { font-size: 2rem; display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .thumb { border: 1px solid #8884; border-radius: 10px; overflow: hidden; }
    .thumb img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #8882; display: block; }
    .thumb .meta { padding: .5rem .6rem; font-size: .8rem; }
    .msg { padding: .6rem .8rem; border-radius: 8px; margin: .4rem 0; }
    .msg.success { background: #2ecc7122; }
    .msg.error { background: #e74c3c22; }
    .btn { display: inline-block; padding: .5rem .9rem; border: 1px solid #8886; border-radius: 8px; text-decoration: none; }
    label { display: block; margin: .6rem 0 .2rem; }
    button, input[type=submit] { padding: .45rem .9rem; border-radius: 8px; cursor: pointer; }
    nav form { display: inline; }
    nav form button { background: none; border: none; cursor: pointer; color: inherit; text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>📅 AI Social Media Scheduler</h1>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'core:dashboard' %}">Dashboard</a>
        <a href="{% url 'core:upload' %}">Upload</a>
        <span class="muted">{{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}<button type="submit">Log out</button></form>
      {% else %}
        <a href="{% url 'login' %}">Log in</a>
      {% endif %}
    </nav>
  </header>

  {% if messages %}
    {% for message in messages %}
      <div class="msg {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
