<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Social Media Scheduler{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
    header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid #8884; padding-bottom: .5rem; }
    .muted { opacity: .65; font-size: .9rem; }
    .cards { display: flex; gap: 1rem; margin: 1.5rem 0; }
    .card { flex: 1; border: 1px solid #8884; border-radius: 10px; padding: 1rem; }
    .card b { font-size: 2rem; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>📅 AI Social Media Scheduler</h1>
    <span class="muted">
      {% if user.is_authenticated %}{{ user.username }}{% else %}guest{% endif %}
    </span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
