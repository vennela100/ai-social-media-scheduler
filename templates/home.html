{% extends "base.html" %}

{% block content %}
  <p class="muted">Upload a video, let AI write the captions, schedule once — it publishes itself to YouTube, Instagram, and LinkedIn.</p>

  <div class="cards">
    <div class="card"><b>{{ video_count }}</b> videos uploaded</div>
    <div class="card"><b>{{ post_count }}</b> scheduled posts</div>
  </div>

  <p><a class="btn" href="{% url 'login' %}">Log in to get started</a></p>
{% endblock %}
