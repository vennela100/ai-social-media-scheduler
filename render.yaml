# Render Blueprint. Lets you create the web service from this file instead of
# clicking through the dashboard. Free tier; the worker/scheduler is NOT here —
# that runs on GitHub Actions (see .github/workflows/, added in Phase 4).
services:
  - type: web
    name: ai-social-scheduler
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    # --timeout 120: uploads stream through this process up to Cloudinary, which
    # easily exceeds gunicorn's 30s default and gets the worker SIGKILLed (→ 500).
    # --workers 2: keep the /healthz/ check answerable while one worker is busy
    # on a slow upload, so Render doesn't mark the service unhealthy.
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true        # Render generates a strong key for you
      - key: DJANGO_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: DATABASE_URL
        sync: false                # paste your Neon connection string in the dashboard
      - key: TOKEN_ENCRYPTION_KEY
        sync: false                # paste your Fernet key (do NOT let Render regenerate it)
      # DJANGO_ALLOWED_HOSTS is unnecessary: settings.py auto-adds
      # RENDER_EXTERNAL_HOSTNAME, which Render injects automatically.
